<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C언어 퀴즈 — 40문항 리빌드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161b24;
    --surface2: #1e2533;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --green: #39ff85;
    --red: #ff4466;
    --yellow: #ffd93d;
    --purple: #c084fc;
    --text: #e8eaf0;
    --muted: #6b7591;
    --border: #2a3147;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative; z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* ── START ── */
  #start-screen { text-align: center; animation: fadeIn 0.8s ease; width: 100%; }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,229,255,0.5);
    letter-spacing: -2px;
    margin-bottom: 8px;
  }
  .logo span { color: var(--accent2); }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 40px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .mode-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 28px;
    text-align: left;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .mode-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .mode-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }

  .toggle-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-top: 1px solid var(--border);
  }
  .toggle-row:first-of-type { border-top: none; }
  .toggle-label { font-size: 0.9rem; }
  .toggle-label .small { display: block; font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  /* toggle switch */
  .toggle {
    position: relative; width: 44px; height: 24px;
    background: var(--surface2); border-radius: 100px;
    cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--muted);
    transition: left 0.2s, background 0.2s;
  }
  .toggle.on { background: rgba(255,107,53,0.25); }
  .toggle.on::after { left: 23px; background: var(--accent2); }

  .toggle-row.parent-off .toggle { opacity: 0.4; pointer-events: none; }
  .toggle-row.parent-off .toggle-label { opacity: 0.4; }

  .info-cards {
    display: flex; gap: 16px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 32px;
  }
  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    min-width: 120px;
  }
  .info-card .num { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .info-card .label { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 16px 56px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(0,229,255,0.3);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,229,255,0.5); }
  .btn-start.hard { background: linear-gradient(135deg, var(--red), #b8284a); color:#fff; box-shadow: 0 4px 24px rgba(255,68,102,0.4); }
  .btn-start.hard:hover { box-shadow: 0 8px 32px rgba(255,68,102,0.6); }

  /* ── QUIZ ── */
  #quiz-screen { width: 100%; animation: slideIn 0.5s ease; }

  .quiz-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding: 14px 20px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .quiz-progress { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--muted); }
  .quiz-progress span { color: var(--accent); font-weight: 700; font-size: 1.1rem; }

  .score-display { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--muted); }
  .score-display span { color: var(--green); font-weight: 700; }

  .progress-bar-wrap { background: var(--surface2); border-radius: 100px; height: 4px; flex: 1; min-width:80px; max-width: 120px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 100px; transition: width 0.4s ease; }

  /* hearts */
  .hearts-bar {
    display: flex; gap: 6px; align-items: center;
  }
  .heart {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    transition: transform 0.3s, filter 0.3s, opacity 0.3s;
    filter: drop-shadow(0 0 6px rgba(255,68,102,0.5));
  }
  .heart.lost {
    opacity: 0.2;
    filter: grayscale(1);
    transform: scale(0.85);
  }
  .heart.breaking {
    animation: heartBreak 0.6s ease;
  }
  @keyframes heartBreak {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.4); filter: drop-shadow(0 0 12px var(--red)); }
    100% { transform: scale(0.85); opacity: 0.2; filter: grayscale(1); }
  }

  /* timer */
  .timer-bar {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .timer-icon { color: var(--yellow); }
  .timer-value { color: var(--yellow); font-weight: 700; font-size: 1rem; min-width: 22px; text-align: right; }
  .timer-value.danger { color: var(--red); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

  .timer-ring {
    position: relative;
    width: 30px; height: 30px;
  }
  .timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .timer-ring .ring-bg-t { fill: none; stroke: var(--surface2); stroke-width: 3; }
  .timer-ring .ring-fg-t { fill: none; stroke: var(--yellow); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 75.4; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-ring .ring-fg-t.danger { stroke: var(--red); }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }
  .qtype-short  .question-card::before  { background: linear-gradient(90deg, var(--accent), #007baa); }
  .qtype-multi  .question-card::before  { background: linear-gradient(90deg, var(--yellow), #e0a800); }
  .qtype-choice .question-card::before  { background: linear-gradient(90deg, var(--purple), #7c3aed); }

  .question-type-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-short  { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.3); }
  .badge-multi  { background: rgba(255,217,61,0.1); color: var(--yellow); border: 1px solid rgba(255,217,61,0.3); }
  .badge-choice { background: rgba(192,132,252,0.1); color: var(--purple); border: 1px solid rgba(192,132,252,0.3); }
  .badge-hard   { background: rgba(255,68,102,0.15); color: var(--red); border: 1px solid rgba(255,68,102,0.4); margin-left: 6px; }

  .question-num { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-bottom: 10px; }

  .question-text {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 8px;
    white-space: pre-wrap;
  }

  .answer-area { margin-top: 22px; }

  /* text input */
  .answer-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
  }
  .answer-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
  .answer-input::placeholder { color: var(--muted); }

  /* choices */
  .multi-hint {
    font-size: 0.75rem;
    color: var(--yellow);
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }

  .choice-list { display: flex; flex-direction: column; gap: 9px; }

  .choice-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .choice-item:hover:not(.disabled) { border-color: var(--accent); background: rgba(0,229,255,0.05); }
  .choice-item.selected       { border-color: var(--accent); background: rgba(0,229,255,0.08); }
  .choice-item.selected-multi { border-color: var(--yellow); background: rgba(255,217,61,0.08); }
  .choice-item.disabled { cursor: default; pointer-events: none; }
  .choice-item.reveal-correct { border-color: var(--green) !important; background: rgba(57,255,133,0.08) !important; }
  .choice-item.reveal-wrong   { border-color: var(--red) !important;   background: rgba(255,68,102,0.08) !important; }

  .choice-marker {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }
  .choice-marker.square { border-radius: 5px; }
  .choice-item.selected .choice-marker       { border-color: var(--accent); background: var(--accent); color: #000; }
  .choice-item.selected-multi .choice-marker { border-color: var(--yellow); background: var(--yellow); color: #000; }
  .choice-item.reveal-correct .choice-marker { border-color: var(--green); background: var(--green); color: #000; }
  .choice-item.reveal-wrong .choice-marker   { border-color: var(--red); background: var(--red); color: #fff; }

  .choice-text { font-size: 0.93rem; line-height: 1.5; }

  .btn-submit {
    margin-top: 16px;
    width: 100%;
    background: linear-gradient(135deg, var(--accent2), #cc4f1a);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 4px 16px rgba(255,107,53,0.3);
  }
  .btn-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,107,53,0.5); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* result */
  .result-card {
    margin-top: 18px;
    border-radius: 14px;
    padding: 24px;
    animation: fadeIn 0.4s ease;
    display: none;
  }
  .result-card.show { display: block; }
  .result-card.correct   { background: rgba(57,255,133,0.06);  border: 1px solid rgba(57,255,133,0.3); }
  .result-card.wrong     { background: rgba(255,68,102,0.06);   border: 1px solid rgba(255,68,102,0.3); }
  .result-card.partial   { background: rgba(255,217,61,0.05);  border: 1px solid rgba(255,217,61,0.3); }
  .result-card.timeout   { background: rgba(255,107,53,0.06);   border: 1px solid rgba(255,107,53,0.35); }

  .result-status { display: flex; align-items: center; gap: 10px; font-size: 1.05rem; font-weight: 700; margin-bottom: 14px; }
  .result-status .icon { font-size: 1.3rem; }
  .correct .result-status { color: var(--green); }
  .wrong .result-status   { color: var(--red); }
  .partial .result-status { color: var(--yellow); }
  .timeout .result-status { color: var(--accent2); }

  .result-label { font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .result-answer { background: #0a0c12; border-radius: 8px; padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; color: var(--text); margin-bottom: 14px; white-space: pre-wrap; word-break: break-word; }
  .result-explanation { font-size: 0.88rem; line-height: 1.75; color: #a0aabf; }

  .partial-score {
    display: inline-block;
    background: rgba(255,217,61,0.15);
    border: 1px solid rgba(255,217,61,0.4);
    border-radius: 6px;
    padding: 4px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--yellow);
    margin-bottom: 12px;
  }

  .btn-next {
    margin-top: 20px;
    width: 100%;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-next:hover { background: var(--surface); border-color: var(--accent); }

  /* ── END ── */
  #end-screen { text-align: center; animation: fadeIn 0.8s ease; width: 100%; }

  .end-title { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .end-title.gameover { color: var(--red); }
  .end-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; }

  .end-score-ring { width: 170px; height: 170px; margin: 24px auto; position: relative; }
  .end-score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg   { fill: none; stroke: var(--surface2); stroke-width: 10; }
  .ring-fill { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; stroke-dasharray: 502; transition: stroke-dashoffset 1.5s ease; }
  .end-score-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .end-score-num { font-family: 'JetBrains Mono', monospace; font-size: 2.6rem; font-weight: 700; color: var(--text); line-height: 1; }
  .end-score-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

  .end-stats { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin-bottom: 32px; }
  .end-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 22px; min-width: 100px; }
  .end-stat .s-num { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; font-weight: 700; }
  .end-stat .s-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .end-stat.s-correct .s-num { color: var(--green); }
  .end-stat.s-partial .s-num { color: var(--yellow); }
  .end-stat.s-wrong   .s-num { color: var(--red); }

  .btn-restart {
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 15px 42px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin: 0 6px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,229,255,0.3);
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,229,255,0.5); }
  .btn-restart.ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); box-shadow: none; }

  .hidden { display: none !important; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>
<div id="app">

  <!-- START -->
  <div id="start-screen">
    <div class="logo">C<span>lang</span>.quiz</div>
    <div class="subtitle">C언어 기초 40문항 테스트</div>

    <div class="info-cards">
      <div class="info-card">
        <div class="num" id="total-count">-</div>
        <div class="label">출제 문항</div>
      </div>
      <div class="info-card">
        <div class="num" id="max-opts" style="color:var(--purple)">8</div>
        <div class="label">최대 보기 수</div>
      </div>
      <div class="info-card">
        <div class="num" id="mode-display" style="color:var(--green)">NORMAL</div>
        <div class="label">현재 모드</div>
      </div>
    </div>

    <div class="mode-section">
      <div class="mode-title"><div class="dot"></div>HARD MODE 설정</div>

      <div class="toggle-row" id="row-hard">
        <div class="toggle-label">
          하드모드 활성화
          <span class="small">아래 옵션들이 적용됩니다</span>
        </div>
        <div class="toggle" id="toggle-hard" onclick="toggleHard()"></div>
      </div>

      <div class="toggle-row parent-off" id="row-timer">
        <div class="toggle-label">
          ⏱ 타이머 (10초 제한)
          <span class="small">시간 초과 시 자동 오답 처리</span>
        </div>
        <div class="toggle" id="toggle-timer" onclick="toggleOpt('timer')"></div>
      </div>

      <div class="toggle-row parent-off" id="row-extra">
        <div class="toggle-label">
          📚 추가 난이도 10문제
          <span class="small">심화 응용 문제를 추가합니다</span>
        </div>
        <div class="toggle" id="toggle-extra" onclick="toggleOpt('extra')"></div>
      </div>

      <div class="toggle-row parent-off" id="row-hearts">
        <div class="toggle-label">
          ❤ 체력 3 (오답 3회 시 게임오버)
          <span class="small">3번 틀리면 즉시 종료</span>
        </div>
        <div class="toggle" id="toggle-hearts" onclick="toggleOpt('hearts')"></div>
      </div>
    </div>

    <button class="btn-start" id="btn-start" onclick="startQuiz()">퀴즈 시작하기</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" class="hidden">
    <div class="quiz-header">
      <div class="quiz-progress">문제 <span id="q-current">1</span> / <span id="q-total">-</span></div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="hearts-bar hidden" id="hearts-bar"></div>
      <div class="timer-bar hidden" id="timer-bar">
        <div class="timer-ring">
          <svg viewBox="0 0 30 30">
            <circle class="ring-bg-t" cx="15" cy="15" r="12"/>
            <circle class="ring-fg-t" id="timer-ring-fg" cx="15" cy="15" r="12"/>
          </svg>
        </div>
        <div class="timer-value" id="timer-value">10</div>
      </div>
      <div class="score-display">점수 <span id="score-display">0</span></div>
    </div>

    <div id="question-wrapper">
      <div class="question-card" id="question-card">
        <span class="question-type-badge" id="type-badge"></span>
        <span class="question-type-badge badge-hard hidden" id="hard-badge">HARD</span>
        <div class="question-num" id="question-num"></div>
        <div class="question-text" id="question-text"></div>

// ══════════════════════════════════════════════════════════════════
//  모드 상태
// ══════════════════════════════════════════════════════════════════
let HARD_MODE = false;
let OPT = { timer:false, extra:false, hearts:false };

function toggleHard() {
  HARD_MODE = !HARD_MODE;
  document.getElementById('toggle-hard').classList.toggle('on', HARD_MODE);
  // 하드모드 ON → 모든 옵션 자동 ON, OFF → 모두 OFF
  OPT.timer  = HARD_MODE;
  OPT.extra  = HARD_MODE;
  OPT.hearts = HARD_MODE;
  ['timer','extra','hearts'].forEach(k => {
    document.getElementById('toggle-'+k).classList.toggle('on', OPT[k]);
    document.getElementById('row-'+k).classList.toggle('parent-off', !HARD_MODE);
  });
  updateStartUI();
}

function toggleOpt(k) {
  if (!HARD_MODE) return;
  OPT[k] = !OPT[k];
  document.getElementById('toggle-'+k).classList.toggle('on', OPT[k]);
  updateStartUI();
}

function updateStartUI() {
  const anyOn = HARD_MODE && (OPT.timer || OPT.extra || OPT.hearts);
  const startBtn = document.getElementById('btn-start');
  startBtn.classList.toggle('hard', anyOn);
  startBtn.textContent = anyOn ? '하드모드 시작' : '퀴즈 시작하기';

  const md = document.getElementById('mode-display');
  if (!anyOn) { md.textContent = 'NORMAL'; md.style.color = 'var(--green)'; }
  else       { md.textContent = 'HARD';   md.style.color = 'var(--red)';   }

  // total count preview
  const totalQ = 15;
  // const totalQ = OPT.extra ? (QUESTIONS.length + HARD_QUESTIONS.length) : QUESTIONS.length;
  document.getElementById('total-count').textContent = totalQ;
}

// ══════════════════════════════════════════════════════════════════
//  런타임 상태
// ══════════════════════════════════════════════════════════════════
let questions = [];
let currentIndex = 0;
let score = 0;
let correctCount = 0;
let partialCount = 0;
let wrongCount = 0;
let submitted = false;

let hearts = 3;
let timerInterval = null;
let timeLeft = 10;
let gameOver = false;

// ── 유틸
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function checkTextAnswer(userAns, correctList) {
  const u = userAns.trim().toLowerCase().replace(/\s+/g, ' ');
  return correctList.some(c => c.trim().toLowerCase().replace(/\s+/g, ' ') === u);
}

function show(id) {
  ['start-screen','quiz-screen','end-screen'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

// ══════════════════════════════════════════════════════════════════
//  보기 확장 (최대 8개)
// ══════════════════════════════════════════════════════════════════
function buildExpandedOptions(q) {
  // short 타입은 스킵
  if (q.type !== 'choice' && q.type !== 'multi') return null;

  const allCorrect = Array.isArray(q.answer) ? q.answer : [q.answer];
  const builtInWrong = q.options.filter(o => !allCorrect.includes(o));
  const wrongPool = shuffle([...builtInWrong, ...(q.distractors || [])]);

  // 정답을 랜덤하게 서브샘플링 (너무 많으면 일부만 표시 → 매번 다른 조합)
  // choice는 항상 정답 1개, multi는 2~min(5, 전체정답개수)개 랜덤
  let pickedCorrect;
  if (q.type === 'choice') {
    pickedCorrect = shuffle(allCorrect).slice(0, 1);
  } else {
    const maxPick = Math.min(5, allCorrect.length);
    const minPick = Math.min(2, allCorrect.length);
    const pickCount = minPick + Math.floor(Math.random() * (maxPick - minPick + 1));
    pickedCorrect = shuffle(allCorrect).slice(0, pickCount);
  }

  // 목표 보기 개수: 최대 8, 최소 4
  // multi는 "정답 개수 + 오답 개수 >= 정답보다 살짝 더" 가 되도록
  const target = Math.min(8, Math.max(4, pickedCorrect.length + 3));
  const neededWrong = Math.max(target - pickedCorrect.length, 2);
  const wrongPicked = wrongPool.slice(0, neededWrong);

  return {
    options: shuffle([...pickedCorrect, ...wrongPicked]),
    effectiveAnswer: pickedCorrect  // 이 실행에서 "유효한 정답" (채점 기준)
  };
}

// ══════════════════════════════════════════════════════════════════
//  시작
// ══════════════════════════════════════════════════════════════════
function startQuiz() {
  const pool = OPT.extra ? [...QUESTIONS, ...HARD_QUESTIONS] : [...QUESTIONS];
  questions = shuffle(pool).map(q => {
    const copy = {...q};
    if (q.type === 'choice' || q.type === 'multi') {
      const built = buildExpandedOptions(q);
      copy.displayOptions   = built.options;
      copy.effectiveAnswer  = built.effectiveAnswer;  // 이번 실행에서 표시된 정답만
    }
    return copy;
  }).slice(0, 15);

  currentIndex = 0;
  score = 0; correctCount = 0; partialCount = 0; wrongCount = 0;
  hearts = 3; gameOver = false;

  document.getElementById('q-total').textContent = questions.length;
  document.getElementById('score-display').textContent = 0;

  // hearts bar
  const hb = document.getElementById('hearts-bar');
  if (OPT.hearts) {
    hb.classList.remove('hidden');
    hb.innerHTML = '<div class="heart">❤</div>'.repeat(3);
  } else {
    hb.classList.add('hidden');
  }

  // timer bar visibility
  document.getElementById('timer-bar').classList.toggle('hidden', !OPT.timer);

  show('quiz-screen');
  renderQuestion();
}

// ══════════════════════════════════════════════════════════════════
//  렌더
// ══════════════════════════════════════════════════════════════════
function renderQuestion() {
  submitted = false;
  stopTimer();

  const q = questions[currentIndex];
  const total = questions.length;

  document.getElementById('q-current').textContent = currentIndex + 1;
  document.getElementById('progress-bar').style.width = ((currentIndex / total) * 100) + '%';

  const wrapper = document.getElementById('question-wrapper');
  wrapper.className = 'qtype-' + q.type;

  const badge = document.getElementById('type-badge');
  const badgeMap = {
    short:  ['단답형', 'badge-short'],
    multi:  ['다답형 (복수 선택)', 'badge-multi'],
    choice: ['객관식', 'badge-choice'],
  };
  const [label, cls] = badgeMap[q.type];
  badge.textContent = label;
  badge.className = 'question-type-badge ' + cls;

  const isHard = q.text.includes('[HARD]');
  document.getElementById('hard-badge').classList.toggle('hidden', !isHard);

  document.getElementById('question-num').textContent = `Q${currentIndex + 1}.`;
  document.getElementById('question-text').textContent = q.text.replace('[HARD] ', '');

  const area = document.getElementById('answer-area');
  area.innerHTML = '';
  buildAnswerUI(q, area);

  const btnSubmit = document.createElement('button');
  btnSubmit.className = 'btn-submit';
  btnSubmit.id = 'btn-submit';
  btnSubmit.textContent = '답 제출하기';
  btnSubmit.onclick = () => submitAnswer(false);
  area.appendChild(btnSubmit);

  const resultCard = document.getElementById('result-card');
  resultCard.className = 'result-card';
  document.getElementById('btn-next').classList.add('hidden');

  const qCard = document.getElementById('question-card');
  qCard.style.animation = 'none';
  qCard.offsetHeight;
  qCard.style.animation = 'slideIn 0.4s ease';

  // start timer if enabled
  if (OPT.timer) startTimer();
}

function buildAnswerUI(q, container) {
  if (q.type === 'short') {
    const ta = document.createElement('textarea');
    ta.className = 'answer-input';
    ta.id = 'answer-input';
    ta.rows = 2;
    ta.placeholder = '답을 입력하세요... (Enter로 제출)';
    ta.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!submitted) submitAnswer(false);
      }
    });
    container.appendChild(ta);
    setTimeout(() => ta.focus(), 50);

  } else if (q.type === 'choice') {
    const list = document.createElement('div');
    list.className = 'choice-list';
    list.id = 'choice-list';
    q.displayOptions.forEach((opt, idx) => {
      const item = document.createElement('div');
      item.className = 'choice-item';
      item.dataset.value = opt;
      item.innerHTML = `<div class="choice-marker">${String.fromCharCode(65+idx)}</div><div class="choice-text"></div>`;
      item.querySelector('.choice-text').textContent = opt;
      item.onclick = () => {
        if (submitted) return;
        list.querySelectorAll('.choice-item').forEach(el => el.classList.remove('selected'));
        item.classList.add('selected');
      };
      list.appendChild(item);
    });
    container.appendChild(list);

  } else if (q.type === 'multi') {
    const hint = document.createElement('div');
    hint.className = 'multi-hint';
    hint.textContent = '※ 정답을 모두 선택하세요 (복수 선택 가능)';
    container.appendChild(hint);

    const list = document.createElement('div');
    list.className = 'choice-list';
    list.id = 'choice-list';
    q.displayOptions.forEach((opt, idx) => {
      const item = document.createElement('div');
      item.className = 'choice-item';
      item.dataset.value = opt;
      item.innerHTML = `<div class="choice-marker square">${idx+1}</div><div class="choice-text"></div>`;
      item.querySelector('.choice-text').textContent = opt;
      item.onclick = () => {
        if (submitted) return;
        item.classList.toggle('selected-multi');
        const marker = item.querySelector('.choice-marker');
        marker.textContent = item.classList.contains('selected-multi') ? '✓' : (idx+1);
      };
      list.appendChild(item);
    });
    container.appendChild(list);
  }
}

// ══════════════════════════════════════════════════════════════════
//  타이머
// ══════════════════════════════════════════════════════════════════
function startTimer() {
  timeLeft = 10;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      stopTimer();
      if (!submitted) submitAnswer(true); // timeout
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updTimerColor(fg, val, danger) {
  fg.classList.toggle('danger', danger);
  val.classList.toggle('danger', danger);
}

function updateTimerUI() {
  const val = document.getElementById('timer-value');
  const fg  = document.getElementById('timer-ring-fg');
  val.textContent = Math.max(0, timeLeft);
  const total = 10;
  const circumference = 75.4;
  const offset = circumference - (circumference * timeLeft / total);
  fg.style.strokeDashoffset = offset;
  updTimerColor(fg, val, timeLeft <= 3);
}

// ══════════════════════════════════════════════════════════════════
//  제출
// ══════════════════════════════════════════════════════════════════
function submitAnswer(isTimeout) {
  if (submitted) return;
  submitted = true;
  stopTimer();

  const q = questions[currentIndex];
  const resultCard = document.getElementById('result-card');
  resultCard.classList.add('show');

  document.getElementById('btn-submit').disabled = true;
  const ta = document.getElementById('answer-input');
  if (ta) ta.disabled = true;
  const list = document.getElementById('choice-list');
  if (list) list.querySelectorAll('.choice-item').forEach(el => el.classList.add('disabled'));

  // 정답 표시 (이번 실행에서 실제로 보여진 정답 기준)
  const answerEl = document.getElementById('result-answer');
  const displayedAnswer = q.effectiveAnswer || q.answer;
  if (Array.isArray(displayedAnswer)) answerEl.textContent = displayedAnswer.join(', ');
  else answerEl.textContent = displayedAnswer;
  document.getElementById('result-explanation').textContent = q.explanation;
  document.getElementById('partial-score-wrap').classList.add('hidden');

  let result;

  if (isTimeout) {
    result = 'timeout';
    wrongCount++;
    if (q.type === 'choice' || q.type === 'multi') revealChoices(q, list, []);
  } else if (q.type === 'choice') {
    const sel = list ? list.querySelector('.choice-item.selected') : null;
    const selVal = sel ? sel.dataset.value : null;
    revealChoices(q, list, selVal ? [selVal] : []);
    const correctVal = q.effectiveAnswer ? q.effectiveAnswer[0] : q.answer;
    if (selVal === correctVal) { result = 'correct'; score += 10; correctCount++; }
    else { result = 'wrong'; wrongCount++; }
  } else if (q.type === 'multi') {
    const selVals = list
      ? [...list.querySelectorAll('.choice-item.selected-multi')].map(el => el.dataset.value)
      : [];
    revealChoices(q, list, selVals);

    const correct = q.effectiveAnswer || q.answer;
    const correctSel = selVals.filter(v => correct.includes(v)).length;
    const wrongSel   = selVals.filter(v => !correct.includes(v)).length;

    if (correctSel === correct.length && wrongSel === 0) {
      result = 'correct'; score += 10; correctCount++;
    } else if (correctSel > 0 && wrongSel === 0) {
      result = 'partial';
      const pts = Math.round((correctSel / correct.length) * 10);
      score += pts; partialCount++;
      const wrap = document.getElementById('partial-score-wrap');
      wrap.innerHTML = `<div class="partial-score">부분정답: ${correctSel}/${correct.length} (+${pts}점)</div>`;
      wrap.classList.remove('hidden');
    } else {
      result = 'wrong'; wrongCount++;
    }
  } else { // short
    const userAns = ta ? ta.value : '';
    if (checkTextAnswer(userAns, q.answer)) {
      result = 'correct'; score += 10; correctCount++;
    } else {
      result = 'wrong'; wrongCount++;
    }
  }

  document.getElementById('score-display').textContent = score;

  // UI feedback
  const map = {
    correct:{i:'✓', t:'정답입니다!',              c:'correct'},
    partial:{i:'◑', t:'부분 정답입니다',          c:'partial'},
    wrong:  {i:'✗', t:'오답입니다',                c:'wrong'},
    timeout:{i:'⏱', t:'시간 초과! (자동 오답)',   c:'timeout'},
  };
  document.getElementById('result-icon').textContent = map[result].i;
  document.getElementById('result-text').textContent = map[result].t;
  resultCard.className = 'result-card show ' + map[result].c;

  // hearts
  if (OPT.hearts && (result === 'wrong' || result === 'timeout')) {
    loseHeart();
    if (hearts <= 0) { gameOver = true; }
  }

  // shake on wrong
  if (result === 'wrong' || result === 'timeout') {
    const qc = document.getElementById('question-card');
    qc.classList.add('shake');
    setTimeout(() => qc.classList.remove('shake'), 500);
  }

  const btnNext = document.getElementById('btn-next');
  if (gameOver) {
    btnNext.textContent = '💀 게임 오버 — 결과 보기';
  } else {
    btnNext.textContent = (currentIndex + 1 < questions.length) ? '다음 문제 →' : '결과 보기';
  }
  btnNext.classList.remove('hidden');
}

function revealChoices(q, list, selVals) {
  if (!list) return;
  // 이번 실행에서 실제로 표시된 정답만 기준
  const src = q.effectiveAnswer || q.answer;
  const correct = Array.isArray(src) ? src : [src];
  list.querySelectorAll('.choice-item').forEach(el => {
    const v = el.dataset.value;
    if (correct.includes(v)) el.classList.add('reveal-correct');
    else if (selVals.includes(v)) el.classList.add('reveal-wrong');
  });
}

function loseHeart() {
  hearts = Math.max(0, hearts - 1);
  const hb = document.getElementById('hearts-bar');
  const hearts_el = hb.querySelectorAll('.heart');
  // 가장 오른쪽에 살아있는 하트부터 파괴
  for (let i = hearts_el.length - 1; i >= 0; i--) {
    if (!hearts_el[i].classList.contains('lost')) {
      hearts_el[i].classList.add('breaking');
      setTimeout(() => {
        hearts_el[i].classList.remove('breaking');
        hearts_el[i].classList.add('lost');
      }, 600);
      break;
    }
  }
}

// ══════════════════════════════════════════════════════════════════
//  다음 / 결과 / 재시작
// ══════════════════════════════════════════════════════════════════
function nextQuestion() {
  if (gameOver) { showEnd(); return; }

  currentIndex++;
  if (currentIndex >= questions.length) {
    showEnd();
  } else {
    renderQuestion();
    const qs = document.getElementById('quiz-screen');
    qs.style.animation = 'none';
    qs.offsetHeight;
    qs.style.animation = 'slideIn 0.4s ease';
  }
}

function showEnd() {
  stopTimer();
  const gradedTotal = correctCount + partialCount + wrongCount;
  const pct = gradedTotal > 0 ? Math.round(((correctCount + partialCount * 0.5) / gradedTotal) * 100) : 0;

  document.getElementById('end-correct').textContent = correctCount;
  document.getElementById('end-partial').textContent = partialCount;
  document.getElementById('end-wrong').textContent = wrongCount;
  document.getElementById('end-pct').textContent = pct + '%';

  const title = document.getElementById('end-title');
  const sub = document.getElementById('end-sub');
  if (gameOver) {
    title.textContent = '// GAME OVER';
    title.classList.add('gameover');
    sub.textContent = `${currentIndex + 1}번째 문제에서 체력이 모두 소진되었습니다`;
  } else {
    title.textContent = '// 퀴즈 완료!';
    title.classList.remove('gameover');
    const tag = OPT.extra || OPT.timer || OPT.hearts ? '하드모드' : '노멀';
    sub.textContent = `${tag} · 총 ${gradedTotal}문항`;
  }

  show('end-screen');

  setTimeout(() => {
    const offset = 502 - (502 * pct / 100);
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
    const color = pct >= 80 ? '#39ff85' : pct >= 50 ? '#00e5ff' : '#ff4466';
    document.getElementById('ring-fill').style.stroke = color;
  }, 100);
}
